version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: ims_timescaledb
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims_secret
      POSTGRES_DB: ims
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d ims"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7.0
    container_name: ims_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: ims_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims_backend
    # Override DB hostnames to use Docker container names (not localhost)
    environment:
      DATABASE_URL: postgresql://ims:ims_secret@timescaledb:5432/ims
      MONGODB_URL: mongodb://mongodb:27017/ims
      REDIS_URL: redis://redis:6379
      WORKER_COUNT: "10"
      RATE_LIMIT_PER_SEC: "10000"
      QUEUE_MAX_SIZE: "50000"
      DEBOUNCE_WINDOW_SECONDS: "10"
      CORS_ORIGINS: "http://localhost:3000"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules    

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ims_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  timescale_data:
  mongo_data:
  redis_data:
